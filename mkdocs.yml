site_name: lmxlab
site_description: Educational MLX library for transformer language models on Apple Silicon
repo_url: https://github.com/michaelellis003/lmxlab

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Architecture:
    - Overview: architecture/overview.md
    - Configurable Block: architecture/configurable-block.md
    - MLX Idioms: architecture/mlx-idioms.md
    - Compiled Training: architecture/compiled-training.md
    - Unified Memory: architecture/unified-memory.md
    - Production Optimizations: architecture/production-optimizations.md
  - Models: models/index.md
  - Data: data/index.md
  - Training: training/index.md
  - Inference: inference/index.md
  - Recipes: recipes/index.md
  - Experiments:
    - Methodology: experiments/methodology.md
  - Developer Log: devlog/index.md
  - API Reference:
    - Overview: api/index.md
    - Core: api/core.md
    - Models: api/models.md
    - Training: api/training.md
    - Data: api/data.md
    - Evaluation: api/eval.md
    - Inference: api/inference.md
    - Experiments: api/experiments.md
