site_name: lmxlab
site_description: MLX library for transformer language models on Apple Silicon
repo_url: https://github.com/michaelellis003/lmxlab

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - API Reference:
    - Overview: api/index.md
    - Core: api/core.md
    - Models: api/models.md
    - Training: api/training.md
    - Data: api/data.md
    - Evaluation: api/eval.md
    - Inference: api/inference.md
