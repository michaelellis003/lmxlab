[project]
name = "lmt-metal"
version = "0.1.0"
description = "Port LMT to Apple MLX for native Apple Silicon GPU training and inference"
requires-python = ">=3.12"
dependencies = [
    "mlx>=0.25",
    "numpy",
    "safetensors",
]

[project.optional-dependencies]
experiments = ["mlflow-skinny"]
dev = [
    "pytest>=8.0",
    "ruff>=0.7",
    "mypy>=1.11",
    "mkdocs-material",
    "mkdocstrings[python]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lmt_metal"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: tests that take >10s (training loops, large models)",
    "gpu: requires Apple Silicon GPU",
    "integration: end-to-end tests",
]
addopts = ["--strict-markers", "--tb=short", "-q"]

[tool.ruff]
line-length = 79

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["lmt_metal"]

[tool.mypy]
python_version = "3.12"
strict = true
